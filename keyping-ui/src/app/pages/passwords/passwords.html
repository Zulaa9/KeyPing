<div class="card">
  <div class="card-header">
    <h2 class="title">Stored passwords</h2>
    <span class="muted" *ngIf="!loading">
      Total: {{ entries.length }}
    </span>
  </div>

  <div class="card-body">
    <table class="table">
      <thead>
        <tr>
          <th>Created</th>
          <th>Length</th>
          <th>Classes</th>
          <th>Note</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngIf="loading">
          <td colspan="4" class="muted">Loading...</td>
        </tr>

        <tr *ngIf="!loading && !entries.length">
          <td colspan="4" class="muted">No entries yet.</td>
        </tr>

        <tr *ngFor="let e of entries">
          <td>{{ fmtDate(e.createdAt) }}</td>
          <td>{{ e.length }}</td>
          <td>
            <span class="chip" *ngFor="let c of maskToChips(e.classMask)">
              {{ c }}
            </span>
          </td>
          <td>{{ e.note || '—' }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
