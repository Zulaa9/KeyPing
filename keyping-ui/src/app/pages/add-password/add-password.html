<div class="page">
  <div class="card">
    <h1>Add password</h1>
    <p class="subtitle">
      KeyPing solo guarda patrones y metadatos de forma local. No hay
      autocompletado ni sincronizacion en la nube.
    </p>

    <form class="form" (ngSubmit)="onSave()">
      <div class="form-row">
        <label class="field">
          <span class="label">Service / app name (opcional)</span>
          <input
            type="text"
            [(ngModel)]="label"
            name="label"
            placeholder="e.g. Gmail, Binance, Steam…"
          />
        </label>
      </div>

      <div class="form-row">
        <label class="field full">
          <span class="label">Password</span>
          <input
            type="password"
            required
            [(ngModel)]="pwd"
            name="pwd"
            placeholder="Enter a new password"
            (input)="debouncedCheck()"
          />
        </label>
      </div>

      <div class="form-row two-cols">
        <!-- Usuario -->
        <div class="field">
          <label class="field">
          <span class="label">Usuario (opcional)</span>
          <input
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="usuario (opcional)"
          />
          </label>
        </div>

        <!-- Correo -->
        <div class="field">
          <label class="field">
          <span class="label">Correo (opcional)</span>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="correo (opcional)"
          />
          </label>
        </div>
      </div>


      <div class="form-row two-cols">
        <label class="field">
          <span class="label">Login URL (opcional)</span>
          <input
            type="url"
            [(ngModel)]="loginUrl"
            name="loginUrl"
            placeholder="https://example.com/login"
          />
        </label>

        <label class="field">
          <span class="label">Password change URL (opcional)</span>
          <input
            type="url"
            [(ngModel)]="passwordChangeUrl"
            name="passwordChangeUrl"
            placeholder="https://example.com/account/security"
          />
        </label>
      </div>

      <div
        class="alert"
        *ngIf="alert"
        [ngClass]="alert.level"
      >
        <div class="alert-title">{{ alert.title }}</div>
        <div class="alert-text">{{ alert.message }}</div>
      </div>

      <div class="actions">
        <button type="submit" class="btn primary">Save</button>
        <button type="button" class="btn ghost" (click)="onCancel()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
