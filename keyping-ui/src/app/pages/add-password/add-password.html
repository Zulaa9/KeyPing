<div class="page add-page">
  <div class="page-header">
    <div>
      <p class="eyebrow">Vault</p>
      <h1>Añadir contraseña</h1>
      <p class="muted">
        Guarda patrones y metadatos de forma local. Sin nube, sin autocompletado.
      </p>
    </div>
    <div class="pill pill-muted">Nuevo registro</div>
  </div>

  <div class="card-surface">
    <form class="form" (ngSubmit)="onSave()">
      <div class="form-grid">
        <label class="field full">
          <span class="label">Service / app name (opcional)</span>
          <input
            type="text"
            [(ngModel)]="label"
            name="label"
            placeholder="e.g. Gmail, Binance, Steam…"
          />
        </label>

        <label class="field full">
          <span class="label">Password</span>
          <input
            type="password"
            required
            [(ngModel)]="pwd"
            name="pwd"
            placeholder="Introduce una nueva contraseña"
            (input)="onPasswordInput()"
            [ngClass]="{ 'is-error': passwordError }"
          />
          <small class="field-error" *ngIf="passwordError">
            La contraseña es obligatoria.
          </small>
        </label>

        <label class="field">
          <span class="label">Usuario (opcional)</span>
          <input
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="usuario (opcional)"
          />
        </label>

        <label class="field">
          <span class="label">Correo (opcional)</span>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="correo (opcional)"
          />
        </label>

        <label class="field">
          <span class="label">Login URL (opcional)</span>
          <input
            type="url"
            [(ngModel)]="loginUrl"
            name="loginUrl"
            placeholder="https://example.com/login"
          />
        </label>

        <label class="field">
          <span class="label">Password change URL (opcional)</span>
          <input
            type="url"
            [(ngModel)]="passwordChangeUrl"
            name="passwordChangeUrl"
            placeholder="https://example.com/account/security"
          />
        </label>
      </div>

      <div
        class="alert"
        *ngIf="alert"
        [ngClass]="alert.level"
      >
        <div class="alert-title">{{ alert.title }}</div>
        <div class="alert-text">{{ alert.message }}</div>
      </div>

      <div class="footer-row">
        <label class="field checkbox footer-checkbox">
          <input
            type="checkbox"
            [(ngModel)]="twoFactorEnabled"
            name="twoFactorEnabled"
          />
          <span class="label">2FA habilitado</span>
        </label>

        <div class="footer-actions">
          <button type="submit" class="btn primary">Guardar</button>
          <button type="button" class="btn ghost" (click)="onCancel()">
            Cancelar
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
