<div class="layout-shell">
  <!-- SIDEBAR -->
  <aside class="sidebar" [class.sidebar-locked]="locked">
    <div class="sidebar-header">
      <img [src]="logoPath" class="app-logo" alt="KeyPing logo" />
      <span class="app-name">KeyPing</span>
    </div>

    <nav class="sidebar-nav">
      <a
        routerLink="/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
        [class.nav-disabled]="locked"
        (click)="onNavClick($event)"
      >
        <span class="nav-icon">🏠</span>
        <span>{{ 'nav.dashboard' | t }}</span>
      </a>

      <a routerLink="/passwords" routerLinkActive="active" class="nav-item" [class.nav-disabled]="locked" (click)="onNavClick($event)">
        <div class="nav-main">
          <span class="nav-icon">🔒</span>
          <span>{{ 'nav.passwords' | t }}</span>
        </div>

        <span class="nav-badge" *ngIf="passwordCount !== null">
          {{ passwordCount }}
        </span>
      </a>

      <kp-password-generator></kp-password-generator>

      <!-- <a class="nav-item disabled">
        <span class="nav-icon">🌐</span>
        <span>Data Breach Check</span>
      </a> -->

      <a routerLink="/health" routerLinkActive="active" class="nav-item" [class.nav-disabled]="locked" (click)="onNavClick($event)">
        <span class="nav-icon">🛡️</span>
        <span>{{ 'nav.health' | t }}</span>
      </a>

      <a
        routerLink="/settings"
        routerLinkActive="active"
        class="nav-item"
        [class.nav-disabled]="locked"
        (click)="onNavClick($event)"
      >
        <span class="nav-icon" >⚙️</span>
        <span>{{ 'nav.settings' | t }}</span>
      </a>
      <a
        class="nav-item tour-nav"
        [class.nav-disabled]="locked"
        (click)="onNavClick($event); restartTour.emit()"
      >
        <span class="nav-icon">🧭</span>
        <span>{{ 'onboarding.eyebrow' | t }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button type="button" class="lock-button" (click)="onLock()">
        <span class="nav-icon">🔐</span>
        <span>{{ 'nav.lock' | t }}</span>
      </button>
    </div>
  </aside>

  <!-- CONTENIDO DINAMICO -->
  <main class="main">
    <router-outlet></router-outlet>
  </main>
</div>
